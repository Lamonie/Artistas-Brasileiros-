<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamoniê Rádio PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cor-player: #1a1a1a; --cor-detalhe: #00ff88; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 100px; }
        
        header { 
            text-align: center; 
            padding: 30px 20px; 
            font-size: 28px; 
            font-weight: bold;
            background: linear-gradient(to bottom, #111, #000);
            letter-spacing: 2px;
        }

        .section-title { padding: 10px 20px; color: var(--cor-detalhe); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            padding: 15px; 
        }

        .card { 
            background: #111; 
            padding: 15px; 
            border-radius: 18px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s;
            border: 1px solid #222;
        }

        .card:active { transform: scale(0.95); background: #222; }

        /* Capas das rádios iguais */
        .cover {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, #333, #111);
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--cor-detalhe);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .card b { font-size: 14px; display: block; margin-top: 5px; height: 35px; overflow: hidden; }

        .player { 
            position: fixed; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 92%; 
            max-width: 500px;
            background: var(--cor-player); 
            padding: 15px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
            z-index: 1000;
        }

        .info-player b { color: var(--cor-detalhe); font-size: 16px; }
        .info-player small { color: #888; }

        button { background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
        
        /* Efeito de tocando */
        .playing { border-color: var(--cor-detalhe) !important; }
    </style>
</head>
<body>

<header>📻 LAMONIÊ RÁDIO</header>

<div class="section-title">Minhas Favoritas (CE & SP)</div>
<div id="grid-fav" class="grid"></div>

<div class="player">
    <div class="info-player">
        <b id="t">Selecione uma rádio</b><br>
        <small id="sub">Aguardando...</small>
    </div>
    <button onclick="toggle()" id="btnPlay">
        <i class="fas fa-play-circle"></i>
    </button>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const btnPlay = document.getElementById("btnPlay");

// Lista de Rádios Específicas
const radios = [
    // PEDRA BRANCA - CE
    { name: "Rádio Trapiá FM", city: "Pedra Branca - CE", url: "https://servidor31.brlogic.com:8328/live" },
    { name: "Sertão Central AM", city: "Pedra Branca - CE", url: "https://servidor22.brlogic.com:8012/live" },
    
    // BOA VIAGEM - CE
    { name: "Asa Branca AM", city: "Boa Viagem - CE", url: "https://servidor24.brlogic.com:8108/live" },
    { name: "Liberdade Auxiliadora", city: "Boa Viagem - CE", url: "https://servidor31.brlogic.com:8040/live" },
    
    // SÃO PAULO
    { name: "Jovem Pan FM", city: "São Paulo - SP", url: "https://servidor31.brlogic.com:8300/live" },
    { name: "Metropolitana FM", city: "São Paulo - SP", url: "https://servidor22.brlogic.com:8032/live" },
    { name: "Alpha FM", city: "São Paulo - SP", url: "https://23113.live.streamtheworld.com/ALPHAFM_SC" },
    { name: "89 FM Rock", city: "São Paulo - SP", url: "https://26533.live.streamtheworld.com/RADIO_89FMSC" },
    { name: "Mix FM SP", city: "São Paulo - SP", url: "https://mixfm.crossradio.com.br/stream" },
    { name: "Gazeta FM", city: "São Paulo - SP", url: "https://servidor22.brlogic.com:8174/live" }
];

function carregar(){
    const grid = document.getElementById("grid-fav");
    grid.innerHTML = radios.map((r, index)=>`
        <div class="card" id="card-${index}" onclick="play('${r.url}','${r.name}','${r.city}', ${index})">
            <div class="cover"><i class="fas fa-broadcast-tower"></i></div>
            <b>${r.name}</b>
            <small style="color:#666; font-size:10px">${r.city}</small>
        </div>
    `).join("");
}

function play(url, nome, cidade, index){
    // Remove destaque de todos os cards
    document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
    // Adiciona destaque no selecionado
    document.getElementById(`card-${index}`).classList.add('playing');

    audio.src = url;
    audio.load();
    audio.play().catch(()=>{
        alert("Erro ao conectar com a rádio. Tente outra!");
    });

    document.getElementById("t").innerText = nome;
    document.getElementById("sub").innerText = cidade;
    atualizarBotao();
}

function toggle(){
    if(audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
    atualizarBotao();
}

function atualizarBotao(){
    btnPlay.innerHTML = audio.paused ? '<i class="fas fa-play-circle"></i>' : '<i class="fas fa-pause-circle"></i>';
}

// Inicia a lista
carregar();
</script>

</body>
</html>
