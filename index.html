<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamoniê Rádio PRO</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
header{text-align:center;padding:20px;font-size:25px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px}
.card{background:#111;padding:15px;border-radius:15px;text-align:center;cursor:pointer}
.player{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:90%;background:#111;padding:10px;border-radius:20px;display:flex;justify-content:space-between;align-items:center}
button{background:none;border:none;color:#fff;font-size:25px}
</style>
</head>

<body>

<header>📻 Lamoniê Rádio PRO</header>

<div id="grid" class="grid"></div>

<div class="player">
<div>
<b id="t">Selecione uma rádio</b><br>
<small>AO VIVO</small>
</div>
<button onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>

/* ================= API METHODS ================= */

async function GET(url){
return fetch(url).then(r=>r.json()).catch(()=>null)
}

async function POST(url,data){
return fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
}

async function PUT(url,data){
return fetch(url,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
}

async function PATCH(url,data){
return fetch(url,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
}

/* =============================================== */

const radios = [

{name:"89 FM Rock",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RADIO_89FM.mp3"},
{name:"Antena 1",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/ANTENA1.mp3"},

{name:"Rádio Brasil Hits",url:"https://stream.zeno.fm/8k0y9f9n1tzuv"},
{name:"Rádio Pop",url:"https://stream.zeno.fm/8k0y9f9n1tzuv"},
{name:"Rádio Dance",url:"https://stream.zeno.fm/8k0y9f9n1tzuv"}

];

/* 🔁 GERAR 150 */
for(let i=1;i<=150;i++){
radios.push({
name:"Rádio Online "+i,
url:"https://stream.zeno.fm/8k0y9f9n1tzuv"
});
}

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");

grid.innerHTML = radios.map(r=>`
<div class="card" onclick="play('${r.url}','${r.name}')">
📻<br><b>${r.name}</b>
</div>
`).join("");

function play(url,nome){
audio.pause();
audio.src = url;
audio.load();
audio.play().catch(()=>{
alert("Rádio não compatível 😢");
});
document.getElementById("t").innerText = nome;
}

function toggle(){
audio.paused ? audio.play() : audio.pause();
}

/* 🔥 EXEMPLO USANDO GET (não quebra nada) */
GET("https://jsonplaceholder.typicode.com/posts/1").then(r=>{
console.log("GET funcionando:",r)
})

</script>

</body>
</html>
