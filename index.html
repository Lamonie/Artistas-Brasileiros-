<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil Music PRO</title>
<style>

body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:white;
  display:flex;
}

/* MENU LATERAL */
.sidebar {
  width:220px;
  background:#000;
  height:100vh;
  padding:20px;
  position:fixed;
}

.sidebar h2 {
  color:#1DB954;
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  background:#1DB954;
  color:white;
  border-radius:20px;
}

/* CONTEÚDO */
.main {
  margin-left:220px;
  padding:20px;
  width:100%;
}

.grid {
  display:flex;
  flex-wrap:wrap;
}

.card {
  width:180px;
  margin:10px;
  background:#181818;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
  background:#282828;
}

.card img {
  width:100%;
  border-radius:8px;
}

/* PLAYER */
.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:50%;
  background:#1DB954;
  color:white;
}

.progress {
  width:100%;
}

.lista-musicas {
  margin-top:20px;
}

.musica {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.musica:hover {
  background:#222;
}

</style>
</head>
<body>
<div class="sidebar">
<h2>🎧 Brasil Music</h2>
<button onclick="voltar()">🏠 Início</button>
</div>
<div class="main">
<h1>Artistas</h1>
<div class="grid" id="artistas"></div>
<div class="lista-musicas" id="musicas"></div>
</div>
<div class="player">
<div id="tocando">Nada tocando</div>
<input type="range" id="barra" class="progress" value="0">
<div>
<span id="tempoAtual">0:00</span> /
<span id="tempoTotal">0:00</span>
</div>
<div class="controls">
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="anterior()">⏮</button>
<button onclick="proxima()">⏭</button>
</div>
</div>
</div>
<script>

const artistas = [
{
nome:"Gusttavo Lima",
img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Gusttavo_Lima.jpg",
musicas:[
{titulo:"Balada Boa",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{titulo:"Apelido Carinhoso",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"}
]
},
{
nome:"Anitta",
img:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Anitta_2022.jpg",
musicas:[
{titulo:"Envolver",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
{titulo:"Show das Poderosas",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"}
]
}
];

let artistaAtual = 0;
let musicaAtual = 0;

const audio = document.getElementById("audio");

function carregarArtistas(){
let html="";
artistas.forEach((a,i)=>{
html+=`
<div class="card" onclick="abrirArtista(${i})">
<img src="${a.img}">
<p>${a.nome}</p>
</div>`;
});
document.getElementById("artistas").innerHTML=html;
}

function abrirArtista(i){
artistaAtual=i;
let lista="";
artistas[i].musicas.forEach((m,index)=>{
lista+=`<div class="musica" onclick="tocar(${index})">${m.titulo}</div>`;
});
document.getElementById("musicas").innerHTML=lista;
}

function tocar(i){
musicaAtual=i;
let m=artistas[artistaAtual].musicas[i];
audio.src=m.src;
document.getElementById("tocando").innerText=m.titulo;
audio.play();
}

function play(){audio.play();}
function pause(){audio.pause();}

function proxima(){
musicaAtual++;
if(musicaAtual>=artistas[artistaAtual].musicas.length) musicaAtual=0;
tocar(musicaAtual);
}

function anterior(){
musicaAtual--;
if(musicaAtual<0) musicaAtual=artistas[artistaAtual].musicas.length-1;
tocar(musicaAtual);
}

function voltar(){
document.getElementById("musicas").innerHTML="";
}

audio.addEventListener("timeupdate", ()=>{
let barra=document.getElementById("barra");
barra.value=(audio.currentTime/audio.duration)*100;

let min=Math.floor(audio.currentTime/60);
let seg=Math.floor(audio.currentTime%60);
document.getElementById("tempoAtual").innerText=min+":"+("0"+seg).slice(-2);

let minT=Math.floor(audio.duration/60)||0;
let segT=Math.floor(audio.duration%60)||0;
document.getElementById("tempoTotal").innerText=minT+":"+("0"+segT).slice(-2);
});

document.getElementById("barra").addEventListener("input",(e)=>{
audio.currentTime=(e.target.value/100)*audio.duration;
});

carregarArtistas();

</script>
</body>
</html>
:::
