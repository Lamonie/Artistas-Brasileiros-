<script>
const artistsData = [
    {
        name: 'Daft Punk',
        image: 'https://i.scdn.co/image/ab6761610000e5ebc429344bde4618a56250954b',
        albums: [
            { title: 'Homework', year: 1997 },
            { title: 'Discovery', year: 2001 },
            { title: 'Human After All', year: 2005 },
            { title: 'Random Access Memories', year: 2013 }
        ],
        hits: [
            { title: 'Get Lucky', url: 'https://cdn.pixabay.com/download/audio/2022/11/22/audio_16886d2d25.mp3' },
            { title: 'One More Time', url: 'https://cdn.pixabay.com/download/audio/2022/11/22/audio_16886d2d25.mp3' }
        ]
    },
    {
        name: 'Gorillaz',
        image: 'https://i.scdn.co/image/ab6761610000e5eb26a71efb33037894a4805763',
        albums: [
            { title: 'Gorillaz', year: 2001 },
            { title: 'Demon Days', year: 2005 },
            { title: 'Plastic Beach', year: 2010 },
            { title: 'Cracker Island', year: 2023 }
        ],
        hits: [
            { title: 'Feel Good Inc.', url: 'https://cdn.pixabay.com/download/audio/2022/11/22/audio_16886d2d25.mp3' }
        ]
    }
];

const searchInput = document.getElementById('search-input');
const artistsContainer = document.getElementById('artists-container');

let currentAudio = null;

function renderArtists(artists) {
    artistsContainer.innerHTML = '';

    artists.forEach(artist => {
        const artistCard = document.createElement('div');
        artistCard.className = 'artist-card';

        const albumsHtml = artist.albums.map(album => `
            <li>
                🎵 ${album.title}
                <span style="float:right; opacity:0.7;">${album.year}</span>
            </li>
        `).join('');

        const hitsHtml = artist.hits.map(hit => `
            <div class="music-controls">
                <span>${hit.title}</span><br>
                <button class="btn play" onclick="playMusic('${hit.url}')">▶</button>
                <button class="btn pause" onclick="pauseMusic()">⏸</button>
                <button class="btn stop" onclick="stopMusic()">⏹</button>
            </div>
        `).join('');

        artistCard.innerHTML = `
            <img src="${artist.image}">
            <h2>${artist.name}</h2>

            <div class="albums-list">
                <strong>Álbuns:</strong>
                <ul>${albumsHtml}</ul>
            </div>

            <div class="hits-list">
                <strong>Player:</strong>
                ${hitsHtml}
            </div>
        `;

        artistsContainer.appendChild(artistCard);
    });
}

function playMusic(url) {
    if (currentAudio) {
        currentAudio.pause();
    }
    currentAudio = new Audio(url);
    currentAudio.play();
}

function pauseMusic() {
    if (currentAudio) {
        currentAudio.pause();
    }
}

function stopMusic() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }
}

searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = artistsData.filter(a =>
        a.name.toLowerCase().includes(term)
    );
    renderArtists(filtered);
});

renderArtists(artistsData);
</script>
