<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamoniê Rádio v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 120px; }
        
        header { text-align: center; padding: 25px; font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .cidade-label { padding: 15px 20px 5px; color: var(--neon); font-size: 12px; text-transform: uppercase; font-weight: bold; opacity: 0.8; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        
        .card { 
            background: var(--card); padding: 20px 10px; border-radius: 20px; text-align: center; 
            cursor: pointer; border: 1px solid #222; transition: 0.2s;
        }
        .card:active { transform: scale(0.95); background: #222; }
        .card.playing { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        /* Capas das rádios padronizadas */
        .capa-padrao {
            width: 60px; height: 60px; background: linear-gradient(135deg, #222, #000);
            border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 25px; color: var(--neon);
            border: 2px solid #333;
        }

        .card b { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Player Fixo */
        .player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20,20,20,0.95);
            backdrop-filter: blur(15px); border-top: 1px solid #333; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
            z-index: 9999;
        }

        .info-musica b { color: var(--neon); font-size: 15px; display: block; }
        .info-musica span { color: #888; font-size: 12px; }

        .controles button { background: none; border: none; color: #fff; font-size: 35px; }
    </style>
</head>
<body>

<header>📻 LAMONIÊ RÁDIO</header>

<div class="cidade-label">Pedra Branca & Boa Viagem</div>
<div id="ceara-grid" class="grid"></div>

<div class="cidade-label">Grande São Paulo</div>
<div id="sp-grid" class="grid"></div>

<div class="player-bar">
    <div class="info-musica">
        <b id="radio-nome">Escolha uma rádio</b>
        <span id="radio-cidade">Ceará / SP</span>
    </div>
    <div class="controles">
        <button onclick="toggle()" id="btn-play"><i class="fas fa-play-circle"></i></button>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
const audio = document.getElementById("audio-player");
const btnPlay = document.getElementById("btn-play");

// Lista atualizada com links HTTPS (mais seguros para GitHub/iPhone)
const listaRadios = [
    // CEARÁ
    { name: "Rádio Trapiá FM", city: "Pedra Branca - CE", url: "https://servidor31.brlogic.com:8328/live", cat: "CE" },
    { name: "Sertão Central", city: "Pedra Branca - CE", url: "https://servidor22.brlogic.com:8012/live", cat: "CE" },
    { name: "Asa Branca AM", city: "Boa Viagem - CE", url: "https://servidor24.brlogic.com:8108/live", cat: "CE" },
    { name: "Liberdade FM", city: "Boa Viagem - CE", url: "https://servidor31.brlogic.com:8040/live", cat: "CE" },
    { name: "Somzoom Sat", city: "Fortaleza - CE", url: "https://9650.brasilstream.com.br/stream", cat: "CE" },
    
    // SÃO PAULO
    { name: "Jovem Pan FM", city: "São Paulo - SP", url: "https://servidor31.brlogic.com:8300/live", cat: "SP" },
    { name: "Metropolitana", city: "São Paulo - SP", url: "https://servidor22.brlogic.com:8032/live", cat: "SP" },
    { name: "Mix FM SP", city: "São Paulo - SP", url: "https://mixfm.crossradio.com.br/stream", cat: "SP" },
    { name: "Band FM SP", city: "São Paulo - SP", url: "https://9450.brasilstream.com.br/stream", cat: "SP" },
    { name: "Alpha FM", city: "São Paulo - SP", url: "https://23113.live.streamtheworld.com/ALPHAFM_SC", cat: "SP" }
];

function montarGrid() {
    const gridCE = document.getElementById("ceara-grid");
    const gridSP = document.getElementById("sp-grid");

    listaRadios.forEach((r, i) => {
        const html = `
            <div class="card" id="r-${i}" onclick="tocar(${i})">
                <div class="capa-padrao"><i class="fas fa-rss"></i></div>
                <b>${r.name}</b>
            </div>
        `;
        if(r.cat === "CE") gridCE.innerHTML += html;
        else gridSP.innerHTML += html;
    });
}

function tocar(id) {
    const r = listaRadios[id];
    
    // Visual
    document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
    document.getElementById(`r-${id}`).classList.add('playing');
    
    document.getElementById("radio-nome").innerText = r.name;
    document.getElementById("radio-cidade").innerText = r.city;

    // Áudio
    audio.pause();
    audio.src = r.url;
    audio.load();
    
    // No iPhone, o play precisa de um empurrãozinho
    let playPromise = audio.play();
    
    if (playPromise !== undefined) {
        playPromise.then(_ => {
            atualizarBotao(true);
        }).catch(error => {
            console.log("Erro de reprodução");
            alert("Sinal instável. Tente novamente em instantes.");
            atualizarBotao(false);
        });
    }
}

function toggle() {
    if (audio.paused) {
        audio.play();
        atualizarBotao(true);
    } else {
        audio.pause();
        atualizarBotao(false);
    }
}

function atualizarBotao(tocando) {
    btnPlay.innerHTML = tocando ? '<i class="fas fa-pause-circle"></i>' : '<i class="fas fa-play-circle"></i>';
}

montarGrid();
</script>

</body>
</html>
