<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil Music PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

header {
  background: #1DB954;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.search {
  text-align: center;
  margin: 20px;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 25px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #1DB954;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #181818;
  width: 220px;
  margin: 10px;
  border-radius: 12px;
  padding: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 10px;
  text-align: center;
}

audio {
  width: 90%;
}
</style>

</head>

<body>

<header>🎧 Brasil Music PRO</header>

<div class="search">
<input type="text" id="busca" placeholder="Buscar artista...">
<button onclick="buscar()">Buscar</button>
</div>

<div class="container" id="resultado"></div>

<div class="player">
<audio id="audio" controls></audio>
</div>

<script>

async function buscar() {
  let valor = document.getElementById("busca").value;
  let url = `https://api.deezer.com/search/artist?q=${valor}&output=jsonp`;

  let script = document.createElement("script");
  script.src = url + "&callback=mostrar";
  document.body.appendChild(script);
}

function mostrar(data) {
  let html = "";

  data.data.forEach(a => {
    html += `
    <div class="card" onclick="verArtista(${a.id})">
      <img src="${a.picture_medium}">
      <h3>${a.name}</h3>
      <p>Fans: ${a.nb_fan}</p>
    </div>
    `;
  });

  document.getElementById("resultado").innerHTML = html;
}

function verArtista(id) {
  let script = document.createElement("script");
  script.src = `https://api.deezer.com/artist/${id}/top?limit=10&output=jsonp&callback=topMusicas`;
  document.body.appendChild(script);
}

function topMusicas(data) {
  let html = "<h2 style='text-align:center'>🔥 Top músicas</h2>";

  data.data.forEach(m => {
    html += `
    <div class="card">
      <img src="${m.album.cover_medium}">
      <h3>${m.title}</h3>
      <button onclick="tocar('${m.preview}')">▶ Tocar</button>
    </div>
    `;
  });

  document.getElementById("resultado").innerHTML = html;
}

function tocar(src) {
  let audio = document.getElementById("audio");
  audio.src = src;
  audio.play();
}

</script>

</body>
</html>
