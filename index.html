<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil Music PRO</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:white;
}

header {
  padding:20px;
  background: linear-gradient(90deg,#1DB954,#0d3d1f);
}

.search {
  text-align:center;
  margin:10px;
}

.search input {
  width:80%;
  padding:12px;
  border-radius:20px;
  border:none;
  font-size:16px;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  width:160px;
  margin:10px;
  background:#181818;
  border-radius:10px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:8px;
}

.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:50%;
  background:#1DB954;
  color:white;
}

.progress {
  width:100%;
}
</style>
</head>
<body>
<header>
<h2>🎧 Brasil Music PRO</h2>
</header>
<div class="search">
<input type="text" id="busca" placeholder="🔍 Buscar artista..." onkeyup="filtrar()">
</div>
<div class="container" id="lista"></div>
<div class="player">
<div id="nomeMusica">Nenhuma música</div>
<input type="range" id="barra" class="progress" value="0">
<div>
<span id="tempoAtual">0:00</span> /
<span id="tempoTotal">0:00</span>
</div>
<div class="controls">
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="anterior()">⏮</button>
<button onclick="proxima()">⏭</button>
</div>
</div>
<script>

const artistas = [
{
nome:"Gusttavo Lima",
img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Gusttavo_Lima.jpg",
musicas:[
{titulo:"Balada Boa",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"}
]
},
{
nome:"Anitta",
img:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Anitta_2022.jpg",
musicas:[
{titulo:"Envolver",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"}
]
}
];

let artistaAtual = 0;
let musicaAtual = 0;

const audio = document.getElementById("audio");

function mostrar(lista){
let html="";
lista.forEach((a,i)=>{
html+=`
<div class="card" onclick="abrir(${i})">
<img src="${a.img}">
<p>${a.nome}</p>
</div>`;
});
document.getElementById("lista").innerHTML=html;
}

function filtrar(){
let valor=document.getElementById("busca").value.toLowerCase();
let filtrado=artistas.filter(a=>a.nome.toLowerCase().includes(valor));
mostrar(filtrado);
}

function abrir(i){
artistaAtual=i;
musicaAtual=0;
tocar();
}

function tocar(){
let m=artistas[artistaAtual].musicas[musicaAtual];
audio.src=m.src;
document.getElementById("nomeMusica").innerText=m.titulo;
audio.play();
}

function play(){audio.play();}
function pause(){audio.pause();}

function proxima(){
musicaAtual++;
if(musicaAtual>=artistas[artistaAtual].musicas.length) musicaAtual=0;
tocar();
}

function anterior(){
musicaAtual--;
if(musicaAtual<0) musicaAtual=artistas[artistaAtual].musicas.length-1;
tocar();
}

audio.addEventListener("timeupdate", ()=>{
let barra=document.getElementById("barra");
barra.value=(audio.currentTime/audio.duration)*100;

let min=Math.floor(audio.currentTime/60);
let seg=Math.floor(audio.currentTime%60);
document.getElementById("tempoAtual").innerText=min+":"+("0"+seg).slice(-2);

let minT=Math.floor(audio.duration/60)||0;
let segT=Math.floor(audio.duration%60)||0;
document.getElementById("tempoTotal").innerText=minT+":"+("0"+segT).slice(-2);
});

document.getElementById("barra").addEventListener("input",(e)=>{
audio.currentTime=(e.target.value/100)*audio.duration;
});

mostrar(artistas);

</script>
</body>
</html>
:::
