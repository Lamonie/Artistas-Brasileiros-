<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil Music PRO</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg, #1DB954, #121212);
  color:white;
}

header {
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.container {
  padding:20px;
}

.card {
  background:#181818;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  background:#282828;
  transform:scale(1.03);
}

.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
}

.controls button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#1DB954;
  color:white;
  cursor:pointer;
}

.progress {
  width:100%;
}

</style>
</head>
<body>
<header>🎧 Brasil Music PRO</header>
<div class="container" id="lista"></div>
<div class="player">
<div id="nomeMusica">Nenhuma música</div>
<input type="range" id="barra" class="progress" value="0">
<div>
<span id="tempoAtual">0:00</span> /
<span id="tempoTotal">0:00</span>
</div>
<div class="controls">
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="anterior()">⏮</button>
<button onclick="proxima()">⏭</button>
</div>
</div>
<script>

const artistas = [
{
nome:"Artista Exemplo",
musicas:[
{
titulo:"Música 1",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
titulo:"Música 2",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
}
]
}
];

let atualArtista = 0;
let atualMusica = 0;

const audio = document.getElementById("audio");

function carregarLista(){
let html="";
artistas.forEach((a,i)=>{
html+=`<div class="card" onclick="abrir(${i})">${a.nome}</div>`;
});
document.getElementById("lista").innerHTML=html;
}

function abrir(i){
atualArtista=i;
atualMusica=0;
carregarMusica();
}

function carregarMusica(){
let m = artistas[atualArtista].musicas[atualMusica];
audio.src=m.src;
document.getElementById("nomeMusica").innerText=m.titulo;
audio.play();
}

function play(){ audio.play(); }
function pause(){ audio.pause(); }

function proxima(){
atualMusica++;
if(atualMusica>=artistas[atualArtista].musicas.length) atualMusica=0;
carregarMusica();
}

function anterior(){
atualMusica--;
if(atualMusica<0) atualMusica=artistas[atualArtista].musicas.length-1;
carregarMusica();
}

audio.addEventListener("timeupdate", ()=>{
let barra=document.getElementById("barra");
barra.value=(audio.currentTime/audio.duration)*100;

let min=Math.floor(audio.currentTime/60);
let seg=Math.floor(audio.currentTime%60);
document.getElementById("tempoAtual").innerText=min+":"+("0"+seg).slice(-2);

let minT=Math.floor(audio.duration/60)||0;
let segT=Math.floor(audio.duration%60)||0;
document.getElementById("tempoTotal").innerText=minT+":"+("0"+segT).slice(-2);
});

document.getElementById("barra").addEventListener("input",(e)=>{
audio.currentTime=(e.target.value/100)*audio.duration;
});

carregarLista();

</script>
</body>
</html>
:::
